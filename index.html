<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일론머스크 타임박싱 데일리 플래너</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 프린트 스타일 최적화 */
        @media print {
            body {
                background-color: white !important;
                color: black !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            main {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
            }
            .print-hide {
                display: none !important;
            }
            input, textarea {
                border-bottom: 1px solid #ccc !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <!-- 리액트 마운트 루트 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 타임박싱 시간표에 칠할 고급스러운 파스텔 색상 프리셋
        const COLORS = [
            { id: 'rose',    hex: '#fda4af', name: '긴급/중요 (로즈)' },
            { id: 'orange',  hex: '#fdba74', name: '업무/공부 (오렌지)' },
            { id: 'amber',   hex: '#fcd34d', name: '휴식/개인 (앰버)' },
            { id: 'lime',    hex: '#a3e635', name: '운동/건강 (라임)' },
            { id: 'teal',    hex: '#2dd4bf', name: '자기개발 (틸)' },
            { id: 'sky',     hex: '#7dd3fc', name: '회의/미팅 (스카이)' },
            { id: 'indigo',  hex: '#a5b4fc', name: '학습/독서 (인디고)' },
            { id: 'violet',  hex: '#c4b5fd', name: '창작/기획 (바이올렛)' },
            { id: 'pink',    hex: '#f9a8d4', name: '가족/친구 (핑크)' },
            { id: 'slate',   hex: '#94a3b8', name: '기타 (슬레이트)' },
        ];

        const DEFAULT_PRIORITIES = [
            { id: 'priority-1', text: '', checked: false },
            { id: 'priority-2', text: '', checked: false },
            { id: 'priority-3', text: '', checked: false },
            { id: 'priority-4', text: '', checked: false },
            { id: 'priority-5', text: '', checked: false },
        ];

        // 6시부터 24시(자정)까지 표시
        const HOURS = Array.from({ length: 19 }, (_, i) => i + 6); 

        const createEmptyRow = () => ({
            id: `row-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
            plan: '',
            blocks: ['', '', '', '']
        });

        const createEmptyTimeBox = () => {
            return HOURS.map(h => ({
                hour: h,
                rows: [createEmptyRow()]
            }));
        };

        // 구버전(plan/blocks 직접) → 신버전(rows 배열) 마이그레이션
        const migrateTimeBox = (rawTimeBox) => {
            return rawTimeBox.map(entry => {
                if (entry.rows) return entry;
                return {
                    hour: entry.hour,
                    rows: [{ id: `row-${entry.hour}-mg`, plan: entry.plan || '', blocks: entry.blocks || ['', '', '', ''] }]
                };
            });
        };

        // 로컬 타임존 기준 오늘 날짜 구하기 (시차 버그 원천 방지)
        const getLocalTodayDate = () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        function App() {
            // 마스터 DB 데이터베이스
            const [db, setDb] = useState({});
            
            // 현재 활성화된 날짜
            const [date, setDate] = useState(() => getLocalTodayDate());
            const [selectedDayIndex, setSelectedDayIndex] = useState(0);

            // 실시간 주체 상태들
            const [topPriorities, setTopPriorities] = useState(DEFAULT_PRIORITIES);
            const [brainDump, setBrainDump] = useState([]);
            const [timeBox, setTimeBox] = useState(createEmptyTimeBox());
            
            const [newDumpText, setNewDumpText] = useState('');
            const [brushColor, setBrushColor] = useState('#7dd3fc');
            const [priorityDragOverIndex, setPriorityDragOverIndex] = useState(null);
            const [priorityDraggingIndex, setPriorityDraggingIndex] = useState(null);
            const [paintAction, setPaintAction] = useState(null); // 'paint' | 'erase'
            const [isPainting, setIsPainting] = useState(false);

            // 로딩 세션 가드
            const isInitialMount = useRef(true);

            // 로컬스토리지 복원
            useEffect(() => {
                const savedDb = localStorage.getItem('timebox_master_db_v4');
                if (savedDb) {
                    try {
                        const parsed = JSON.parse(savedDb);
                        // 각 날짜의 timeBox를 신버전으로 마이그레이션
                        const migrated = Object.fromEntries(
                            Object.entries(parsed).map(([d, val]) => [
                                d,
                                { ...val, timeBox: val.timeBox ? migrateTimeBox(val.timeBox) : createEmptyTimeBox() }
                            ])
                        );
                        setDb(migrated);
                    } catch (e) {
                        console.error("로컬 스토리지 복원 실패", e);
                    }
                }
                isInitialMount.current = false;
            }, []);

            // 로컬스토리지 자동 누적 저장
            useEffect(() => {
                if (!isInitialMount.current) {
                    localStorage.setItem('timebox_master_db_v4', JSON.stringify(db));
                }
            }, [db]);

            // 날짜 전환 감지 및 데이터 교체 적용
            useEffect(() => {
                if (date) {
                    const selectedDate = new Date(date);
                    const day = selectedDate.getDay();
                    const mapped = day === 0 ? 6 : day - 1;
                    setSelectedDayIndex(mapped);

                    const dayData = db[date];
                    if (dayData) {
                        // 혹시 과거 3개 슬롯 버전 데이터가 존재할 시 하위호환성용 5개로 정렬 보완
                        const paddedPriorities = dayData.topPriorities ? [...dayData.topPriorities] : [];
                        while (paddedPriorities.length < 5) {
                            paddedPriorities.push({ id: `priority-${paddedPriorities.length + 1}-${Date.now()}`, text: '', checked: false });
                        }
                        setTopPriorities(paddedPriorities.slice(0, 5));
                        setBrainDump(dayData.brainDump || []);
                        setTimeBox(migrateTimeBox(dayData.timeBox || createEmptyTimeBox()));
                    } else {
                        setTopPriorities([
                            { id: 'priority-1', text: '', checked: false },
                            { id: 'priority-2', text: '', checked: false },
                            { id: 'priority-3', text: '', checked: false },
                            { id: 'priority-4', text: '', checked: false },
                            { id: 'priority-5', text: '', checked: false },
                        ]);
                        setBrainDump([]);
                        setTimeBox(createEmptyTimeBox());
                    }
                }
            }, [date, db]);

            const saveCurrentDayToDb = (updatedPriorities, updatedBrainDump, updatedTimeBox) => {
                setDb(prev => ({
                    ...prev,
                    [date]: {
                        topPriorities: updatedPriorities || topPriorities,
                        brainDump: updatedBrainDump || brainDump,
                        timeBox: updatedTimeBox || timeBox
                    }
                }));
            };

            const handleAddBrainDump = (e) => {
                e.preventDefault();
                if (!newDumpText.trim()) return;
                const newItem = {
                    id: `bd-${Date.now()}`,
                    text: newDumpText.trim()
                };
                const nextList = [...brainDump, newItem];
                setBrainDump(nextList);
                setNewDumpText('');
                saveCurrentDayToDb(null, nextList, null);
            };

            const handleDeleteDump = (id) => {
                const nextList = brainDump.filter(item => item.id !== id);
                setBrainDump(nextList);
                saveCurrentDayToDb(null, nextList, null);
            };

            const handleUpdateDumpText = (id, newText) => {
                const nextList = brainDump.map(item => item.id === id ? { ...item, text: newText } : item);
                setBrainDump(nextList);
                saveCurrentDayToDb(null, nextList, null);
            };

            const handleUpdatePriorityText = (index, newText) => {
                const next = [...topPriorities];
                next[index].text = newText;
                setTopPriorities(next);
                saveCurrentDayToDb(next, null, null);
            };

            const handleTogglePriorityCheck = (index) => {
                const next = [...topPriorities];
                next[index].checked = !next[index].checked;
                setTopPriorities(next);
                saveCurrentDayToDb(next, null, null);
            };

            const handleUpdatePlanText = (hour, rowId, newText) => {
                const next = timeBox.map(entry =>
                    entry.hour === hour
                        ? { ...entry, rows: entry.rows.map(r => r.id === rowId ? { ...r, plan: newText } : r) }
                        : entry
                );
                setTimeBox(next);
                saveCurrentDayToDb(null, null, next);
            };

            const handleAddRow = (hour) => {
                const next = timeBox.map(entry =>
                    entry.hour === hour
                        ? { ...entry, rows: [...entry.rows, createEmptyRow()] }
                        : entry
                );
                setTimeBox(next);
                saveCurrentDayToDb(null, null, next);
            };

            const handleRemoveRow = (hour, rowId) => {
                const next = timeBox.map(entry => {
                    if (entry.hour !== hour) return entry;
                    const filtered = entry.rows.filter(r => r.id !== rowId);
                    return { ...entry, rows: filtered.length > 0 ? filtered : [createEmptyRow()] };
                });
                setTimeBox(next);
                saveCurrentDayToDb(null, null, next);
            };

            // 드래그앤드롭 HTML5 표준 직렬화 패키징
            const handleDragStart = (e, item, source) => {
                const transferData = {
                    source,
                    id: item.id || null,
                    text: item.text || '',
                };
                e.dataTransfer.setData('text/plain', JSON.stringify(transferData));
                e.dataTransfer.effectAllowed = 'move';
            };

            // 우선순위 정렬 전용 ＝ 핸들 드래그 스타트
            const handlePriorityDragStart = (e, index) => {
                const transferData = {
                    source: 'priority',
                    index: index,
                    text: topPriorities[index].text,
                };
                e.dataTransfer.setData('text/plain', JSON.stringify(transferData));
                e.dataTransfer.effectAllowed = 'move';
                setPriorityDraggingIndex(index);
            };

            const handlePriorityDragOver = (e, index) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                setPriorityDragOverIndex(index);
            };

            const handlePriorityDragEnd = () => {
                setPriorityDraggingIndex(null);
                setPriorityDragOverIndex(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            };

            // 우선순위 정렬 처리 핸들러
            const handlePriorityDrop = (e, targetIndex) => {
                e.preventDefault();
                setPriorityDragOverIndex(null);
                setPriorityDraggingIndex(null);
                try {
                    const rawData = e.dataTransfer.getData('text/plain');
                    if (!rawData) return;

                    const dragData = JSON.parse(rawData);
                    let nextPriorities = [...topPriorities];
                    let nextBrainDump = [...brainDump];
                    let nextTimeBox = [...timeBox];

                    if (dragData.source === 'priority') {
                        // 순위 재배정 슬라이더 교환
                        const sourceIndex = dragData.index;
                        if (sourceIndex === undefined || sourceIndex === targetIndex) return;

                        const [removed] = nextPriorities.splice(sourceIndex, 1);
                        nextPriorities.splice(targetIndex, 0, removed);
                        setTopPriorities(nextPriorities);
                    } else {
                        // 외부 목록 항목 유입 덮어쓰기
                        nextPriorities[targetIndex].text = dragData.text;
                        setTopPriorities(nextPriorities);

                        if (dragData.source === 'braindump') {
                            nextBrainDump = brainDump.filter(bd => bd.id !== dragData.id);
                            setBrainDump(nextBrainDump);
                        }
                    }

                    saveCurrentDayToDb(nextPriorities, nextBrainDump, nextTimeBox);
                } catch (err) {
                    console.error("정렬 드롭 에러:", err);
                }
            };

            // 일반 영역 드롭 핸들러
            const handleDrop = (e, targetType, targetIndex) => {
                e.preventDefault();
                try {
                    const rawData = e.dataTransfer.getData('text/plain');
                    if (!rawData) return;

                    const dragData = JSON.parse(rawData);
                    let nextPriorities = [...topPriorities];
                    let nextBrainDump = [...brainDump];
                    let nextTimeBox = [...timeBox];

                    const draggedText = dragData.text;

                    if (targetType === 'plan') {
                        nextTimeBox = timeBox.map(entry => {
                            if (entry.hour !== targetIndex) return entry;
                            const lastRow = entry.rows[entry.rows.length - 1];
                            // 마지막 행에 내용이 있으면 새 행 추가, 비어있으면 덮어쓰기
                            if (lastRow.plan.trim() !== '') {
                                return { ...entry, rows: [...entry.rows, { id: `row-${Date.now()}-drop`, plan: draggedText, blocks: ['', '', '', ''] }] };
                            } else {
                                return { ...entry, rows: entry.rows.map((r, i) => i === entry.rows.length - 1 ? { ...r, plan: draggedText } : r) };
                            }
                        });
                        setTimeBox(nextTimeBox);
                    } else if (targetType === 'braindump') {
                        if (dragData.source !== 'braindump') {
                            nextBrainDump = [...brainDump, { id: `bd-${Date.now()}`, text: draggedText }];
                            setBrainDump(nextBrainDump);
                        }
                    }

                    if (dragData.source === 'braindump' && targetType !== 'braindump') {
                        nextBrainDump = brainDump.filter(bd => bd.id !== dragData.id);
                        setBrainDump(nextBrainDump);
                    }

                    saveCurrentDayToDb(nextPriorities, nextBrainDump, nextTimeBox);
                } catch (err) {
                    console.error("일반 드롭 에러:", err);
                }
            };

            // 시간트랙 드로잉 & 스마트 지우개 기능 통합
            const applyBlockColor = (hour, rowId, blockIndex, action) => {
                const next = timeBox.map(entry => {
                    if (entry.hour !== hour) return entry;
                    return {
                        ...entry,
                        rows: entry.rows.map(r => {
                            if (r.id !== rowId) return r;
                            const nextBlocks = [...r.blocks];
                            nextBlocks[blockIndex] = action === 'erase' ? '' : brushColor;
                            return { ...r, blocks: nextBlocks };
                        })
                    };
                });
                setTimeBox(next);
                saveCurrentDayToDb(null, null, next);
            };

            const handleBlockMouseDown = (hour, rowId, blockIndex) => {
                const entry = timeBox.find(e => e.hour === hour);
                if (!entry) return;
                const row = entry.rows.find(r => r.id === rowId);
                if (!row) return;
                const currentBlockColor = row.blocks[blockIndex];
                const action = currentBlockColor === brushColor ? 'erase' : 'paint';
                setPaintAction(action);
                setIsPainting(true);
                applyBlockColor(hour, rowId, blockIndex, action);
            };

            const handleBlockMouseEnter = (hour, rowId, blockIndex) => {
                if (isPainting && paintAction) {
                    applyBlockColor(hour, rowId, blockIndex, paintAction);
                }
            };

            useEffect(() => {
                const handleGlobalMouseUp = () => {
                    setIsPainting(false);
                    setPaintAction(null);
                };
                window.addEventListener('mouseup', handleGlobalMouseUp);
                return () => window.removeEventListener('mouseup', handleGlobalMouseUp);
            }, [isPainting, paintAction, brushColor]);

            // 오늘 일정 클리어
            const handleResetToday = () => {
                if (window.confirm('선택한 날짜의 스케줄러 내용을 모두 비우시겠습니까?')) {
                    const freshPriorities = [
                        { id: 'priority-1', text: '', checked: false },
                        { id: 'priority-2', text: '', checked: false },
                        { id: 'priority-3', text: '', checked: false },
                        { id: 'priority-4', text: '', checked: false },
                        { id: 'priority-5', text: '', checked: false },
                    ];
                    setTopPriorities(freshPriorities);
                    setBrainDump([]);
                    const emptyTime = createEmptyTimeBox();
                    setTimeBox(emptyTime);
                    saveCurrentDayToDb(freshPriorities, [], emptyTime);
                }
            };

            // 로컬 백업 내보내기 (.json)
            const handleExportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `timebox_backup_${date}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            };

            // 전체 저장소 초기화
            const handleClearAllHistory = () => {
                if (window.confirm('🔥 경고: 저장된 모든 날짜의 누적 기록이 영구 삭제됩니다. 진행하시겠습니까?')) {
                    setDb({});
                    setTopPriorities(DEFAULT_PRIORITIES);
                    setBrainDump([]);
                    setTimeBox(createEmptyTimeBox());
                    localStorage.removeItem('timebox_master_db_v4');
                    alert('모든 히스토리가 성공적으로 초기화되었습니다!');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans transition-all duration-300">
                    
                    {/* 상단 툴바 (인쇄 시 자동 숨김) */}
                    <div className="max-w-6xl mx-auto mb-6 bg-white p-4 rounded-xl shadow-md border border-stone-200 flex flex-wrap items-center justify-between gap-4 print-hide">
                        <div className="flex flex-wrap items-center gap-3">
                            <span className="text-xs font-bold text-stone-500 uppercase tracking-wider">시간트랙 펜:</span>
                            <div className="flex items-center gap-1 bg-stone-50 p-1.5 rounded-lg border border-stone-200">
                                {COLORS.map((col) => (
                                    <button
                                        key={col.id}
                                        onClick={() => {
                                            setBrushColor(col.hex);
                                        }}
                                        title={col.name}
                                        className={`w-6 h-6 rounded-full border-2 transition-all duration-200 cursor-pointer ${
                                            brushColor === col.hex 
                                                ? 'border-stone-800 scale-110 shadow-sm' 
                                                : 'border-transparent opacity-80 hover:opacity-100'
                                        }`}
                                        style={{ backgroundColor: col.hex }}
                                    />
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-2 flex-wrap">
                            <button
                                onClick={handleExportData}
                                className="px-3 py-1.5 text-xs font-bold text-stone-600 hover:text-stone-800 border border-stone-300 rounded-lg cursor-pointer bg-stone-50 hover:bg-stone-100 transition-all flex items-center gap-1"
                            >
                                💾 백업 내보내기
                            </button>
                            <button
                                onClick={handleResetToday}
                                className="px-3 py-1.5 text-xs font-bold text-amber-600 hover:text-amber-700 border border-amber-200 hover:border-amber-300 rounded-lg cursor-pointer bg-amber-50/50 transition-all"
                            >
                                🧹 오늘 리셋
                            </button>
                            <button
                                onClick={handleClearAllHistory}
                                className="px-3 py-1.5 text-xs font-bold text-red-600 hover:text-red-700 border border-red-200 hover:border-red-300 rounded-lg cursor-pointer bg-red-50/30 transition-all"
                            >
                                🔥 전체 기록 삭제
                            </button>
                            <button
                                onClick={() => window.print()}
                                className="px-4 py-1.5 text-xs font-bold text-white bg-stone-800 hover:bg-stone-900 rounded-lg cursor-pointer transition-all flex items-center gap-1.5 shadow-md"
                            >
                                🖨️ 인쇄/PDF 저장
                            </button>
                        </div>
                    </div>

                    {/* 플래너 시트 본문 */}
                    <main className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl border border-stone-300 p-6 md:p-10 relative overflow-hidden print:shadow-none print:border-none print:p-0">
                        <div className="absolute inset-0 opacity-[0.012] pointer-events-none" style={{
                            backgroundImage: 'radial-gradient(#000 12%, transparent 12%)',
                            backgroundSize: '20px 20px'
                        }}></div>

                        <header className="flex flex-col md:flex-row md:items-end justify-between border-b-2 border-stone-800 pb-6 mb-8 gap-6 relative z-10">
                            <div>
                                <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-stone-900">TODAY PLAN</h1>
                                <p className="text-xs md:text-sm font-semibold tracking-[0.3em] text-stone-500 mt-1 uppercase">Elon Musk Time Boxing</p>
                            </div>
                            
                            <div className="flex flex-col items-end gap-3 self-start md:self-end">
                                <div className="flex items-center gap-2 text-stone-800">
                                    <span className="text-sm font-bold tracking-wider text-stone-400">📅 DATE:</span>
                                    <input
                                        type="date"
                                        value={date}
                                        onChange={(e) => setDate(e.target.value)}
                                        className="font-bold text-xl text-stone-950 bg-stone-100/70 rounded px-2 py-0.5 border-none focus:ring-2 focus:ring-stone-400 cursor-pointer select-all"
                                        style={{ fontFamily: 'monospace' }}
                                    />
                                </div>
                                
                                <div className="flex items-center gap-2.5">
                                    {['월', '화', '수', '목', '금', '토', '일'].map((day, idx) => {
                                        const isSelected = selectedDayIndex === idx;
                                        const isWeekend = idx === 5 || idx === 6;
                                        return (
                                            <div key={idx} className="relative w-8 h-8 flex items-center justify-center font-bold text-sm select-none">
                                                <span className={`z-10 w-7.5 h-7.5 flex items-center justify-center rounded-full transition-all ${
                                                    isSelected 
                                                        ? 'bg-stone-900 text-white font-black shadow-md' 
                                                        : isWeekend ? 'text-rose-500' : 'text-stone-400'
                                                }`}>
                                                    {day}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12 relative z-10">
                            {/* 왼쪽 컬럼 (우선순위 & 브레인덤프) */}
                            <section className="lg:col-span-5 flex flex-col gap-8">
                                <div className="bg-stone-50/60 rounded-xl p-5 border border-stone-300">
                                    <div className="flex items-center gap-2 mb-4 border-b border-stone-300 pb-2">
                                        <span className="text-xl">🎯</span>
                                        <h2 className="text-lg font-black tracking-wide text-stone-800">TOP 5 PRIORITIES</h2>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {topPriorities.map((priority, index) => (
                                            <div key={priority.id}>
                                                {/* 드롭 위치 표시선 */}
                                                {priorityDragOverIndex === index && priorityDraggingIndex !== null && priorityDraggingIndex !== index && (
                                                    <div className="h-0.5 bg-indigo-400 rounded-full mx-2 mb-1 transition-all" />
                                                )}
                                            <div
                                                onDragOver={(e) => handlePriorityDragOver(e, index)}
                                                onDrop={(e) => handlePriorityDrop(e, index)}
                                                onDragEnd={handlePriorityDragEnd}
                                                className={`group flex items-center gap-3 p-2 px-3 rounded-lg border transition-all duration-200 ${
                                                    priorityDraggingIndex === index
                                                        ? 'opacity-40 scale-95 bg-stone-100 border-stone-300'
                                                        : priorityDragOverIndex === index && priorityDraggingIndex !== index
                                                        ? 'bg-indigo-50 border-indigo-400 shadow-md scale-[1.02]'
                                                        : priority.checked
                                                        ? 'bg-stone-100 border-stone-200'
                                                        : 'bg-white border-stone-300 shadow-sm hover:border-stone-400'
                                                }`}
                                            >
                                                {/* 순서 변경 드래그 ＝ 핸들 */}
                                                <div 
                                                    draggable
                                                    onDragStart={(e) => handlePriorityDragStart(e, index)}
                                                    onDragEnd={handlePriorityDragEnd}
                                                    className="cursor-grab active:cursor-grabbing text-stone-400 hover:text-stone-800 px-1 font-bold text-xl select-none"
                                                >
                                                    ＝
                                                </div>

                                                <button
                                                    onClick={() => handleTogglePriorityCheck(index)}
                                                    className={`w-6 h-6 rounded border-2 flex items-center justify-center transition-all cursor-pointer ${
                                                        priority.checked ? 'bg-stone-800 border-stone-800 text-white' : 'border-stone-400 hover:border-stone-600 bg-white'
                                                    }`}
                                                >
                                                    {priority.checked && (
                                                        <svg className="w-4 h-4 stroke-current" viewBox="0 0 24 24" fill="none" strokeWidth="3">
                                                            <polyline points="20 6 9 17 4 12"></polyline>
                                                        </svg>
                                                    )}
                                                </button>

                                                <input
                                                    type="text"
                                                    value={priority.text}
                                                    onChange={(e) => handleUpdatePriorityText(index, e.target.value)}
                                                    placeholder={`${index + 1}순위 중요한 일을 채워보세요.`}
                                                    className={`w-full bg-transparent border-none focus:outline-none focus:ring-0 text-sm font-semibold text-stone-800 placeholder-stone-400 ${
                                                        priority.checked ? 'line-through text-stone-400' : ''
                                                    }`}
                                                />
                                            </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-stone-50/60 rounded-xl p-5 border border-stone-300 flex-1 flex flex-col min-h-[350px]">
                                    <div className="flex items-center gap-2 mb-4 border-b border-stone-300 pb-2">
                                        <span className="text-xl">💡</span>
                                        <div className="flex-1">
                                            <h2 className="text-lg font-black tracking-wide text-stone-800">BRAIN DUMP</h2>
                                            <p className="text-[10px] text-stone-500 font-medium mt-0.5">할 일을 마구잡이로 적은 뒤 오른쪽 타임박스로 던지세요!</p>
                                        </div>
                                    </div>

                                    <div 
                                        className="space-y-2 flex-1 overflow-y-auto max-h-[320px] pr-1"
                                        onDragOver={handleDragOver}
                                        onDrop={(e) => handleDrop(e, 'braindump', null)}
                                    >
                                        {brainDump.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-stone-400 py-12 text-sm border-2 border-dashed border-stone-200 rounded-lg">
                                                <p className="font-semibold">브레인 덤프에 쓸 내용이 있나요?</p>
                                                <p className="text-xs mt-1">아래 빈칸에 할 일들을 편하게 쭉 적어보세요.</p>
                                            </div>
                                        ) : (
                                            brainDump.map((item) => (
                                                <div
                                                    key={item.id}
                                                    draggable
                                                    onDragStart={(e) => handleDragStart(e, item, 'braindump')}
                                                    className="group flex items-center justify-between bg-white p-2 px-3 rounded-lg border border-stone-200 shadow-sm hover:border-stone-400 transition-all hover:shadow-md cursor-grab active:cursor-grabbing"
                                                >
                                                    <div className="flex items-center gap-2.5 flex-1">
                                                        <div className="text-stone-300 group-hover:text-stone-500 transition-colors">
                                                            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <circle cx="9" cy="5" r="1.5" fill="currentColor"/>
                                                                <circle cx="15" cy="5" r="1.5" fill="currentColor"/>
                                                                <circle cx="9" cy="12" r="1.5" fill="currentColor"/>
                                                                <circle cx="15" cy="12" r="1.5" fill="currentColor"/>
                                                                <circle cx="9" cy="19" r="1.5" fill="currentColor"/>
                                                                <circle cx="15" cy="19" r="1.5" fill="currentColor"/>
                                                            </svg>
                                                        </div>
                                                        <span className="w-1.5 h-1.5 rounded-full bg-stone-500 shrink-0"></span>
                                                        <input
                                                            type="text"
                                                            value={item.text}
                                                            onChange={(e) => handleUpdateDumpText(item.id, e.target.value)}
                                                            className="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-semibold text-stone-800"
                                                        />
                                                    </div>
                                                    <button
                                                        onClick={() => handleDeleteDump(item.id)}
                                                        className="text-stone-300 hover:text-rose-500 p-1 opacity-0 group-hover:opacity-100 transition-all cursor-pointer"
                                                    >
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <form onSubmit={handleAddBrainDump} className="mt-4 pt-3 border-t border-stone-200">
                                        <div className="relative flex items-center">
                                            <input
                                                type="text"
                                                value={newDumpText}
                                                onChange={(e) => setNewDumpText(e.target.value)}
                                                placeholder="생각을 타이핑하고 Enter..."
                                                className="w-full pl-3 pr-10 py-2 text-sm bg-white border border-stone-300 rounded-lg focus:outline-none focus:border-stone-800 focus:ring-0 font-medium"
                                            />
                                            <button
                                                type="submit"
                                                className="absolute right-1.5 top-1.5 w-6 h-6 flex items-center justify-center rounded-md bg-stone-800 hover:bg-stone-950 text-white cursor-pointer transition-colors"
                                            >
                                                <span className="text-sm font-bold">+</span>
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </section>

                            {/* 오른쪽 컬럼 (TIME BOX) */}
                            <section className="lg:col-span-7">
                                <div className="flex items-center gap-2 mb-4">
                                    <span className="text-xl">🕒</span>
                                    <h2 className="text-lg font-black tracking-wide text-stone-800">TIME BOX</h2>
                                    <span className="text-[10px] text-stone-400 font-bold ml-auto">* Do 영역을 문지르듯 연속 드래그하여 채워보세요!</span>
                                </div>

                                <div className="border-2 border-stone-800 rounded-xl overflow-hidden shadow-sm bg-white">
                                    <table className="w-full border-collapse">
                                        <thead>
                                            <tr className="bg-stone-800 text-white border-b-2 border-stone-800 text-sm font-black">
                                                <th className="py-2.5 px-4 text-center border-r border-stone-700 w-1/2">Plan (기록 / 계획)</th>
                                                <th className="py-2.5 px-1 text-center border-r border-stone-700 w-[50px]">T</th>
                                                <th className="py-2.5 px-4 text-center w-1/2">Do (실행시간 체크)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {timeBox.map((entry) => {
                                                const isGrouped = entry.rows.length > 1;
                                                return entry.rows.map((row, rowIdx) => {
                                                    const isFirst = rowIdx === 0;
                                                    const isLast = rowIdx === entry.rows.length - 1;
                                                    return (
                                                        <tr
                                                            key={row.id}
                                                            className={`group/row transition-colors
                                                                ${isLast ? 'border-b-2 border-stone-300' : 'border-b border-stone-200'}
                                                                ${isGrouped ? 'bg-stone-50/70 hover:bg-stone-100/60' : 'hover:bg-stone-50/50'}
                                                            `}
                                                        >
                                                            {/* Plan 셀 */}
                                                            <td
                                                                onDragOver={handleDragOver}
                                                                onDrop={(e) => handleDrop(e, 'plan', entry.hour)}
                                                                className={`p-1 px-3 border-r border-stone-300 relative ${isGrouped && !isFirst ? 'border-t border-dashed border-stone-200' : ''}`}
                                                            >
                                                                {/* 그룹 왼쪽 강조 바 */}
                                                                {isGrouped && (
                                                                    <div className={`absolute left-0 top-0 bottom-0 w-0.5 bg-indigo-300
                                                                        ${isFirst ? 'rounded-t' : ''} ${isLast ? 'rounded-b' : ''}`}
                                                                    />
                                                                )}
                                                                <div className="flex items-center gap-2 w-full">
                                                                    <div
                                                                        draggable
                                                                        onDragStart={(e) => handleDragStart(e, { text: row.plan }, 'plan')}
                                                                        className="text-stone-300 cursor-grab hover:text-stone-500 opacity-0 group-hover/row:opacity-100 transition-opacity p-0.5 shrink-0"
                                                                    >
                                                                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M4 8h16M4 16h16" />
                                                                        </svg>
                                                                    </div>
                                                                    <input
                                                                        type="text"
                                                                        value={row.plan}
                                                                        onChange={(e) => handleUpdatePlanText(entry.hour, row.id, e.target.value)}
                                                                        placeholder="계획을 입력하거나 끌어오세요."
                                                                        className="w-full bg-transparent border-none p-1 focus:ring-0 focus:outline-none text-sm font-bold text-stone-850 placeholder-stone-200"
                                                                    />
                                                                    {/* 행 추가/삭제 버튼 */}
                                                                    <div className="flex items-center gap-0.5 opacity-0 group-hover/row:opacity-100 transition-opacity shrink-0">
                                                                        {entry.rows.length > 1 && (
                                                                            <button
                                                                                onClick={() => handleRemoveRow(entry.hour, row.id)}
                                                                                className="w-5 h-5 rounded flex items-center justify-center text-stone-300 hover:text-rose-500 hover:bg-rose-50 transition-all cursor-pointer"
                                                                                title="이 줄 삭제"
                                                                            >
                                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M20 12H4" />
                                                                                </svg>
                                                                            </button>
                                                                        )}
                                                                        {isLast && (
                                                                            <button
                                                                                onClick={() => handleAddRow(entry.hour)}
                                                                                className="w-5 h-5 rounded flex items-center justify-center text-stone-300 hover:text-indigo-500 hover:bg-indigo-50 transition-all cursor-pointer"
                                                                                title="같은 시간대에 업무 추가"
                                                                            >
                                                                                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4v16m8-8H4" />
                                                                                </svg>
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            </td>

                                                            {/* 시간 셀 */}
                                                            <td className={`py-2 px-1 text-center font-bold text-sm border-r border-stone-300 select-none
                                                                ${isFirst ? 'text-stone-800 bg-stone-100/50' : 'bg-stone-100/30'}
                                                                ${isGrouped && !isFirst ? 'border-t border-dashed border-stone-200' : ''}
                                                            `}>
                                                                {isFirst ? (
                                                                    entry.hour
                                                                ) : (
                                                                    /* 세로 점선 연결 */
                                                                    <div className="flex justify-center">
                                                                        <div className="w-px h-5 border-l-2 border-dashed border-stone-300" />
                                                                    </div>
                                                                )}
                                                            </td>

                                                            {/* Do 셀 */}
                                                            <td className={`p-1.5 px-4 ${isGrouped && !isFirst ? 'border-t border-dashed border-stone-200' : ''}`}>
                                                                <div className="flex w-full h-8 border border-stone-300 rounded-md overflow-hidden bg-stone-50 select-none">
                                                                    {row.blocks.map((blockColor, blockIdx) => (
                                                                        <div
                                                                            key={blockIdx}
                                                                            onMouseDown={() => handleBlockMouseDown(entry.hour, row.id, blockIdx)}
                                                                            onMouseEnter={() => handleBlockMouseEnter(entry.hour, row.id, blockIdx)}
                                                                            className="flex-1 border-r last:border-r-0 border-dashed border-stone-200 cursor-cell transition-all duration-150 hover:brightness-95 relative group/cell"
                                                                            style={{ backgroundColor: blockColor || 'transparent' }}
                                                                        >
                                                                            {!blockColor && (
                                                                                <span className="absolute inset-0 m-auto w-1 h-1 rounded-full bg-stone-300 opacity-40 group-hover/cell:opacity-100"></span>
                                                                            )}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                });
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>

                        <footer className="mt-12 pt-6 border-t border-stone-200 text-center text-xs text-stone-400 font-semibold flex flex-col sm:flex-row items-center justify-between gap-4">
                            <p>© ELON MUSK TIMEBOXING METHOD. ALL RECORDS RETAINED ON LOCAL STORAGE.</p>
                            <div className="flex gap-4">
                                <span>📁 날짜 변경 시 모든 하루 일과 데이터가 개별 누적 저장됩니다.</span>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
